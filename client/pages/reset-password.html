<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Set New Password - ChatWorld</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/responsive.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <a href="/" class="auth-logo">
                <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
                    <rect width="32" height="32" rx="8" fill="#2F2F2F"/>
                    <path d="M8 20V12L12 8H20L24 12V20L20 24H12L8 20Z" stroke="#FAF7F0" stroke-width="1.5" fill="none"/>
                    <circle cx="13" cy="16" r="1.5" fill="#FAF7F0"/>
                    <circle cx="16" cy="16" r="1.5" fill="#FAF7F0"/>
                    <circle cx="19" cy="16" r="1.5" fill="#FAF7F0"/>
                </svg>
                <span>ChatWorld</span>
            </a>
            <h1 class="auth-title">Set new password</h1>
            <p class="auth-subtitle">Choose a strong password for your account.</p>
            <form id="resetForm" class="auth-form" novalidate>
                <input type="hidden" id="token" name="token">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" placeholder="New password" required minlength="8" autocomplete="new-password">
                    <span class="form-hint">At least 8 characters, one uppercase, one lowercase, one number</span>
                    <span class="form-error"></span>
                </div>
                <div class="form-group">
                    <label for="password_confirm">Confirm Password</label>
                    <input type="password" id="password_confirm" name="password_confirm" placeholder="Repeat new password" required autocomplete="new-password">
                    <span class="form-error"></span>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="resetBtn">Reset Password</button>
                <div id="resetError" class="alert alert-error" style="display:none;"></div>
                <div id="resetSuccess" class="alert alert-success" style="display:none;"></div>
            </form>
            <p class="auth-footer">
                <a href="/pages/login.html">Back to sign in</a>
            </p>
        </div>
    </div>
    <script src="/js/auth.js"></script>
</body>
</html>
