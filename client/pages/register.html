<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Create Account - GlobalChat</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/responsive.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <a href="/" class="auth-logo">
                <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
                    <rect width="32" height="32" rx="8" fill="#2F2F2F"/>
                    <path d="M8 20V12L12 8H20L24 12V20L20 24H12L8 20Z" stroke="#FAF7F0" stroke-width="1.5" fill="none"/>
                    <circle cx="13" cy="16" r="1.5" fill="#FAF7F0"/>
                    <circle cx="16" cy="16" r="1.5" fill="#FAF7F0"/>
                    <circle cx="19" cy="16" r="1.5" fill="#FAF7F0"/>
                </svg>
                <span>GlobalChat</span>
            </a>
            <h1 class="auth-title">Create your account</h1>
            <p class="auth-subtitle">Join the global community.</p>
            <form id="registerForm" class="auth-form" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="johndoe" required minlength="3" maxlength="30" pattern="^[a-zA-Z0-9_]+$" autocomplete="username">
                        <span class="form-hint">3-30 characters, letters, numbers, underscores</span>
                        <span class="form-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="display_name">Display Name</label>
                        <input type="text" id="display_name" name="display_name" placeholder="John Doe" required minlength="2" maxlength="60">
                        <span class="form-error"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                    <span class="form-error"></span>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a strong password" required minlength="8" autocomplete="new-password">
                    <span class="form-hint">At least 8 characters, one uppercase, one lowercase, one number</span>
                    <span class="form-error"></span>
                </div>
                <div class="form-group">
                    <label for="password_confirm">Confirm Password</label>
                    <input type="password" id="password_confirm" name="password_confirm" placeholder="Repeat your password" required autocomplete="new-password">
                    <span class="form-error"></span>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="terms" required>
                        <span>I agree to the <a href="/pages/terms.html">Terms of Service</a> and <a href="/pages/privacy.html">Privacy Policy</a></span>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="registerBtn">Create Account</button>
                <div id="registerError" class="alert alert-error" style="display:none;"></div>
            </form>
            <p class="auth-footer">
                Already have an account? <a href="/pages/login.html">Sign in</a>
            </p>
        </div>
    </div>
    <script src="/js/auth.js"></script>
</body>
</html>
